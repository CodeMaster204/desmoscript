
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generated Desmos Graph</title>

  <style>
    html, body { margin: 0; height: 100%; }
    #calculator { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="calculator"></div>

  <script>
    var elt = document.getElementById('calculator');
    var calculator = Desmos.GraphingCalculator(elt);

    const graphdata = {
    version: 11,
    graph: {
        viewport: {xmin: -10, xmax: 10, ymin: -10, ymax: 10}
    },
    expressions : {
        list : [{"type": "expression", "id":"0", "latex": "p_{0}=(0,0)"},
{"type": "expression", "id":"1", "latex": "p_{1}=(0,1)"},
{"type": "expression", "id":"2", "latex": "p_{2}=(1,0)"},
{"type": "expression", "id":"3", "latex": "\\operatorname{polygon}\\left(p_{0},p_{1},p_{2}\\right)"},
{"type": "expression", "id":"4", "latex": "p_{3}=(0,0,0)"},
{"type": "expression", "id":"5", "latex": "(0,0)=(1,2)"},
{"type": "expression", "id":"6", "latex": "w_{aitasecond}=2"},
{"type": "expression", "id":"7", "latex": "a=2","slider":{"min": 2, "max": 3, "step": 4, "hardMin": true, "hardMax":true}},
{"type": "expression", "id":"9", "latex": "b=0","slider":{"min": 2, "max": 4, "step": 1, "hardMin": true, "hardMax":true}},
{"type": "expression", "id":"11", "latex": "c=0","slider":{"min": 2, "max": 4, "step": 1, "hardMin": true, "hardMax":true}},
]
    }
}


    calculator.setState(graphdata);
  </script>
</body>
</html>
